<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }
        section {
            margin: 30px;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>This website is created using Notepad</p>
</header>

<section>
    <h2>About Me</h2>
    <p>Hello! This is my first HTML website.</p>

    <button onclick="showMessage()">Click Me</button>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

<script>
function showMessage() {
    alert("Hello! Thanks for visiting my website.");
}
</script>

</body>
</html>
